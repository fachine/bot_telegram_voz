services:
  - type: worker
    name: agente-facilities-voz
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # valor definido manualmente no dashboard do Render
      - key: GOOGLE_API_KEY
        sync: false          # valor definido manualmente no dashboard do Render
      - key: PORT
        value: 7860
